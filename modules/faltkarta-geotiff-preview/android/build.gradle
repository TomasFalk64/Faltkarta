plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.tf64.faltkarta'
version = '1.0.0'

android {
  namespace 'com.tf64.faltkarta.geotiffpreview'

  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'io.github.beyka:Android-TiffBitmapFactory:0.9.9.1'
}
